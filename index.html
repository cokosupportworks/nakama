  <script>
    // --- 1. 特別支援対応サウンド生成システム ＆ iOS音声復帰機構 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // ホーム画面や他アプリからの復帰時、または画面タップ時にAudioContextを強制レジューム
    function unlockAudio() {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(e => console.log("Audio resume error:", e));
      }
    }
    
    // 確実な復帰のための複数イベントリスナー
    ['touchstart', 'touchend', 'mousedown', 'keydown'].forEach(evt => {
      window.addEventListener(evt, unlockAudio, { passive: true });
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') unlockAudio();
    });

    function playSound(type) {
      unlockAudio();
      const now = audioCtx.currentTime;
      
      if (type === 'correct') {
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(523.25, now);
        osc1.frequency.exponentialRampToValueAtTime(1046.50, now + 0.4);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(659.25, now);
        osc2.frequency.exponentialRampToValueAtTime(1318.51, now + 0.4);
        gainNode.gain.setValueAtTime(0.15, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc1.connect(gainNode);
        osc2.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 0.5);
        osc2.stop(now + 0.5);
      } else if (type === 'wrong') {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(329.63, now);
        osc.frequency.linearRampToValueAtTime(220.00, now + 0.4);
        gainNode.gain.setValueAtTime(0.12, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.4);
      }
    }

    // --- 2. 状態管理（State） ---
    let appState = {
      displayColor: 'color', 
      answerMode: 'touch',
      gradingMode: 'auto', 
      wrongMark: 'check', 
      optionCount: 4, 
      questionSource: 'random',
      customImages: [],
      customQuestions: [], 
      savedQuestionSets: [],
      currentAnswers: [null, null, null, null],
      mistakes: [0, 0, 0, 0] // 設問ごとのミス回数記録
    };

    const EMOJI_GROUPS = [
      { name: 'くだもの', items: ['🍎', '🍌', '🍉', '🍓', '🍇', '🍍'] },
      { name: 'のりもの', items: ['🚗', '✈️', '🚢', '🚂', '🚁', '🚲'] },
      { name: 'どうぶつ', items: ['🐱', '🐶', '🦁', '🦊', '🐻', '🐼'] },
      { name: 'がっき', items: ['🎸', '🎺', '🎹', '🥁', '🎻', '🔔'] },
      { name: 'スポーツ', items: ['⚽', '🏀', '⚾', '🎾', '🏐', '⛳'] },
      { name: 'てんき', items: ['☀️', '☁️', '🌧️', '❄️', '⚡', '🌙'] }
    ];

    let generatedQuestions = [];

    // --- 3. IndexedDBによる画像の保存 ---
    let db;
    const DB_NAME = "DrillImageDB";
    const STORE_NAME = "images";

    function initIndexedDB() {
      return new Promise((resolve) => {
        try {
          const request = indexedDB.open(DB_NAME, 1);
          request.onupgradeneeded = (e) => {
            const dbInstance = e.target.result;
            if (!dbInstance.objectStoreNames.contains(STORE_NAME)) {
              dbInstance.createObjectStore(STORE_NAME, { keyPath: "id" });
            }
          };
          request.onsuccess = (e) => {
            db = e.target.result;
            db.onversionchange = () => { if (db) db.close(); };
            resolve();
          };
          request.onerror = () => resolve();
        } catch (err) { resolve(); }
      });
    }

    function saveImageToDB(id, base64) {
      if (!db) return;
      try {
        const transaction = db.transaction([STORE_NAME], "readwrite");
        transaction.objectStore(STORE_NAME).put({ id, base64 });
      } catch (e) {}
    }

    function deleteImageFromDB(id) {
      if (!db) return;
      try {
        const transaction = db.transaction([STORE_NAME], "readwrite");
        transaction.objectStore(STORE_NAME).delete(id);
      } catch (e) {}
    }

    function loadImagesFromDB() {
      return new Promise((resolve) => {
        if (!db) return resolve([]);
        try {
          const transaction = db.transaction([STORE_NAME], "readonly");
          const request = transaction.objectStore(STORE_NAME).getAll();
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => resolve([]);
        } catch (e) { resolve([]); }
      });
    }

    // --- 4. アプリ起動 ---
    window.onload = async function() {
      updateDrillDate();
      await initIndexedDB();
      appState.customImages = await loadImagesFromDB();
      loadSettings();
      buildInitialCustomQuestions();

      setupDrawingCanvas();
      setupEventListeners();
      setupDualGearLock();

      syncSettingsToUI();
      generateDrill();
    };

    function updateDrillDate() {
      const now = new Date();
      const weekDays = ["にちようび", "げつようび", "かようび", "すいようび", "もくようび", "きんようび", "どようび"];
      document.getElementById('date-display').textContent = `${now.getFullYear()}年 ${now.getMonth() + 1}月 ${now.getDate()}日 (${weekDays[now.getDay()]})`;
    }

    function buildInitialCustomQuestions() {
      if (appState.customQuestions.length < 4) {
        appState.customQuestions = [
          { type: 'emoji', items: ['🍎', '🍎', '🍎', '🚗', '🍎'], correctIndex: 3 },
          { type: 'emoji', items: ['🐶', '🐶', '🎸', '🐶', '🐶'], correctIndex: 2 },
          { type: 'emoji', items: ['🎸', '🎸', '☀️', '🎸', '🎸'], correctIndex: 2 },
          { type: 'emoji', items: ['🚗', '🚗', '🐶', '🚗', '🚗'], correctIndex: 2 } 
        ];
        saveSettings();
      }
    }

    function loadSettings() {
      const saved = localStorage.getItem('なかまはずれ_appState');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          appState.displayColor = parsed.displayColor || 'color';
          appState.answerMode = parsed.answerMode || 'touch';
          appState.gradingMode = parsed.gradingMode || 'auto';
          appState.wrongMark = parsed.wrongMark || 'check';
          appState.optionCount = Number(parsed.optionCount) || 4;
          appState.questionSource = parsed.questionSource || 'random';
          if (parsed.customQuestions) appState.customQuestions = parsed.customQuestions;
          if (parsed.savedQuestionSets) appState.savedQuestionSets = parsed.savedQuestionSets;
        } catch(e) {}
      }
    }

    function saveSettings() {
      localStorage.setItem('なかまはずれ_appState', JSON.stringify({
        displayColor: appState.displayColor,
        answerMode: appState.answerMode,
        gradingMode: appState.gradingMode,
        wrongMark: appState.wrongMark,
        optionCount: appState.optionCount,
        questionSource: appState.questionSource,
        customQuestions: appState.customQuestions,
        savedQuestionSets: appState.savedQuestionSets
      }));
    }

    function syncSettingsToUI() {
      const checkRadio = (name, val) => {
        const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
        if(el) el.checked = true;
      };
      checkRadio('display-color', appState.displayColor);
      checkRadio('answer-mode', appState.answerMode);
      checkRadio('grading-mode', appState.gradingMode);
      checkRadio('wrong-mark', appState.wrongMark);
      checkRadio('question-source', appState.questionSource);
      
      const optionCountEl = document.getElementById('option-count');
      if (optionCountEl) optionCountEl.value = appState.optionCount;

      toggleSettingsVisibility();
    }

    function toggleSettingsVisibility() {
      const drillApp = document.getElementById('drill-app');
      appState.displayColor === 'mono' ? drillApp.classList.add('monochrome-mode') : drillApp.classList.remove('monochrome-mode');
      
      const palette = document.getElementById('drawing-palette');
      if (appState.answerMode === 'draw' || appState.gradingMode === 'manual') {
        palette.classList.remove('hidden', 'translate-y-20');
      } else {
        palette.classList.add('hidden', 'translate-y-20');
      }

      const teacherTools = document.getElementById('teacher-stamp-tools');
      appState.gradingMode === 'manual' ? teacherTools.classList.remove('hidden') : teacherTools.classList.add('hidden');

      const instruction = document.getElementById('instruction-text');
      instruction.textContent = appState.answerMode === 'draw' ? "★ なかまはずれの えの上に、えんぴつで「✖️」をかいてね！" : "★ なかまはずれの えを みつけて、タッチしよう！";

      const wrongMarkSec = document.getElementById('wrong-mark-section');
      appState.gradingMode === 'auto' ? wrongMarkSec.classList.remove('opacity-50', 'pointer-events-none') : wrongMarkSec.classList.add('opacity-50', 'pointer-events-none');
    }

    // --- 5. 問題生成および描画 ---
    function generateDrill() {
      generatedQuestions = [];
      appState.currentAnswers = [null, null, null, null];
      appState.mistakes = [0, 0, 0, 0]; // ミス回数リセット
      clearDrawingCanvas();

      if (appState.questionSource === 'random') {
        for (let i = 0; i < 4; i++) generatedQuestions.push(generateRandomQuestion(i));
      } else {
        for (let i = 0; i < 4; i++) {
          const customQ = appState.customQuestions[i] || { type: 'emoji', items: ['🐶', '🐶', '🐱', '🐶'], correctIndex: 2 };
          let displayItems = [...customQ.items];
          let correctIdx = customQ.correctIndex;

          if (displayItems.length !== appState.optionCount) {
            if (displayItems.length < appState.optionCount) {
              const baseElement = displayItems[correctIdx === 0 ? 1 : 0] || '❓';
              while(displayItems.length < appState.optionCount) displayItems.push(baseElement);
            } else {
              const originalCorrectItem = displayItems[correctIdx];
              displayItems = displayItems.slice(0, appState.optionCount);
              if (correctIdx >= appState.optionCount) {
                 displayItems[appState.optionCount - 1] = originalCorrectItem;
                 correctIdx = appState.optionCount - 1;
              }
            }
          }
          generatedQuestions.push({ id: i, type: customQ.type, items: displayItems, correctIndex: correctIdx });
        }
      }
      renderDrillUI();
    }

    function generateRandomQuestion(id) {
      const allEmojis = EMOJI_GROUPS.flatMap(g => g.items);
      const canUseCustomImages = appState.customImages.length >= 2;
      const useImages = canUseCustomImages && Math.random() < 0.5;

      let baseItem, oddItem;
      if (useImages) {
        const shuffledImages = [...appState.customImages].sort(() => 0.5 - Math.random());
        baseItem = shuffledImages[0].id; 
        oddItem = shuffledImages[1].id;  
      } else {
        const shuffledEmojis = [...allEmojis].sort(() => 0.5 - Math.random());
        baseItem = shuffledEmojis[0]; 
        oddItem = shuffledEmojis[1];  
      }

      const items = [];
      const len = appState.optionCount;
      const correctIdx = Math.floor(Math.random() * len);
      for (let i = 0; i < len; i++) items.push(i === correctIdx ? oddItem : baseItem);

      return { id, type: useImages ? 'image' : 'emoji', items, correctIndex: correctIdx };
    }

    function renderDrillUI() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      generatedQuestions.forEach((q, qIdx) => {
        const row = document.createElement('div');
        row.className = "flex items-center gap-2 sm:gap-4 border-2 border-stone-100 rounded-2xl p-1.5 sm:p-2 bg-stone-50/50 shadow-inner flex-1 min-h-0 relative";
        
        const numLabel = document.createElement('div');
        numLabel.className = "flex-shrink-0 flex items-center justify-center bg-amber-100 text-amber-950 font-black text-sm md:text-xl w-7 h-7 md:w-11 md:h-11 border-2 border-dashed border-amber-800 rounded-full select-none";
        numLabel.textContent = qIdx + 1;
        row.appendChild(numLabel);

        const optionsContainer = document.createElement('div');
        optionsContainer.className = "flex-grow flex justify-center items-center h-full min-h-0 gap-1 sm:gap-2 w-full";

        q.items.forEach((item, itemIdx) => {
          const isCustomImage = appState.customImages.some(img => img.id === item);
          
          // ラッパー要素で横幅の最大領域を均等に制限
          const wrapper = document.createElement('div');
          wrapper.className = "flex-1 min-w-0 h-full flex items-center justify-center p-0.5 sm:p-1";

          const optionBtn = document.createElement('div');
          optionBtn.id = `opt-${qIdx}-${itemIdx}`;
          // 余白排除・コンテナクエリ有効化
          optionBtn.className = "option-box relative flex items-center justify-center bg-white border-4 border-amber-900/10 rounded-2xl active:scale-98 cursor-pointer select-none overflow-hidden hover:border-amber-900/30 transition-all shadow-sm w-full max-h-full aspect-square";
          
          if (isCustomImage) {
            const imgData = appState.customImages.find(img => img.id === item);
            const img = document.createElement('img');
            img.src = imgData.base64;
            // paddingゼロで極限拡大
            img.className = "option-content w-full h-full object-contain p-0 select-none";
            optionBtn.appendChild(img);
          } else {
            const textNode = document.createElement('span');
            // コンテナの幅に連動するサイズ（80cqw）で特大表示
            textNode.className = "option-content filter drop-shadow select-none flex items-center justify-center w-full h-full leading-none";
            textNode.style.fontSize = "80cqw";
            textNode.textContent = item;
            optionBtn.appendChild(textNode);
          }

          const overlay = document.createElement('div');
          overlay.id = `overlay-${qIdx}-${itemIdx}`;
          overlay.className = "absolute inset-0 flex items-center justify-center pointer-events-none z-10";
          optionBtn.appendChild(overlay);

          optionBtn.addEventListener('click', () => {
            if (appState.answerMode === 'touch') handleOptionSelect(qIdx, itemIdx);
          });

          wrapper.appendChild(optionBtn);
          optionsContainer.appendChild(wrapper);
        });

        row.appendChild(optionsContainer);
        container.appendChild(row);
      });

      setTimeout(updateOptionBoundingBoxes, 300);
    }

    let optionBounds = [];
    function updateOptionBoundingBoxes() {
      const drillApp = document.getElementById('drill-app');
      if (!drillApp) return;
      const drillAppRect = drillApp.getBoundingClientRect();
      optionBounds = [];

      generatedQuestions.forEach((q, qIdx) => {
        q.items.forEach((_, itemIdx) => {
          const el = document.getElementById(`opt-${qIdx}-${itemIdx}`);
          if (el) {
            const rect = el.getBoundingClientRect();
            optionBounds.push({
              questionIdx: qIdx, itemIdx: itemIdx,
              xMin: rect.left - drillAppRect.left, yMin: rect.top - drillAppRect.top,
              xMax: rect.right - drillAppRect.left, yMax: rect.bottom - drillAppRect.top
            });
          }
        });
      });
    }

    // --- 6. 判定・フィードバック・ノーミス紙吹雪演出 ---
    function handleOptionSelect(qIdx, itemIdx) {
      if (appState.gradingMode === 'manual') return; 
      if (appState.currentAnswers[qIdx] !== null) return; 

      const q = generatedQuestions[qIdx];
      const isCorrect = (itemIdx === q.correctIndex);

      if (isCorrect) {
        appState.currentAnswers[qIdx] = true;
        playSound('correct');
        showCorrectAnimation(qIdx, itemIdx);
        checkPerfectClear();
      } else {
        appState.mistakes[qIdx]++;
        playSound('wrong');
        showWrongFeedback(qIdx, itemIdx);
      }
    }

    // 全問ノーミス正解を祝う紙吹雪のアニメーションと音楽再生
    function checkPerfectClear() {
      const isAllAnswered = appState.currentAnswers.every(ans => ans === true);
      const isPerfect = appState.mistakes.every(m => m === 0);

      if (isAllAnswered && isPerfect) {
        // nice.mp3の再生
        try {
          const niceAudio = new Audio('nice.mp3');
          niceAudio.play().catch(e => console.warn("Audio play failed:", e));
        } catch(e) {}

        const duration = 3000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        const interval = setInterval(function() {
          const timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) return clearInterval(interval);
          const particleCount = 50 * (timeLeft / duration);
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
          confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
      }
    }

    function showCorrectAnimation(qIdx, itemIdx) {
      const overlay = document.getElementById(`overlay-${qIdx}-${itemIdx}`);
      if (overlay) {
        overlay.innerHTML = `<svg class="w-full h-full p-1" viewBox="0 0 100 100"><path class="red-pen-circle" d="M 50,10 C 75,10 90,30 90,50 C 90,75 70,90 50,90 C 25,90 10,70 10,50 C 10,25 30,10 50,10 C 65,10 82,22 85,38" /></svg>`;
      }
    }

    function showWrongFeedback(qIdx, itemIdx) {
      const overlay = document.getElementById(`overlay-${qIdx}-${itemIdx}`);
      if (!overlay) return;

      if (appState.wrongMark === 'check') {
        // 変更：チェックマークは消さずに残す
        overlay.innerHTML = `<svg class="w-[70%] h-[70%] text-blue-500 font-black animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`;
      } else {
        // うずまきは今まで通り消す
        overlay.innerHTML = `<div class="text-4xl md:text-6xl animate-spin text-amber-500 opacity-85">🌀</div>`;
        setTimeout(() => { if (appState.currentAnswers[qIdx] !== true) overlay.innerHTML = ''; }, 1500);
      }
    }

    // --- 7. えんぴつ描き込み ＆ キャンバス制御 ---
    let canvas, ctx, isDrawing = false, strokes = [], currentStroke = [];
    let activeColor = '#1e293b', activeLineWidth = 4, isEraserMode = false, activeStamp = null;

    function setupDrawingCanvas() {
      canvas = document.getElementById('drawing-canvas');
      if (!canvas) return;
      ctx = canvas.getContext('2d');
      resizeCanvas();
      canvas.addEventListener('touchstart', dragStart, {passive: false});
      canvas.addEventListener('touchmove', drag, {passive: false});
      canvas.addEventListener('touchend', dragEnd, {passive: false});
      canvas.addEventListener('mousedown', dragStart);
      canvas.addEventListener('mousemove', drag);
      canvas.addEventListener('mouseup', dragEnd);
      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      const drillApp = document.getElementById('drill-app');
      if (!drillApp || !canvas) return;
      const rect = drillApp.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      redrawCanvas();
      updateOptionBoundingBoxes();
    }

    function selectPen(color, width) {
      isEraserMode = false; activeStamp = null; activeColor = color; activeLineWidth = width;
      document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('scale-110', 'border-amber-500'));
      if (color === '#1e293b' && document.getElementById('tool-black')) document.getElementById('tool-black').classList.add('scale-110');
      if (color === '#ef4444' && document.getElementById('tool-red')) document.getElementById('tool-red').classList.add('scale-110');
    }

    function selectEraser() {
      isEraserMode = true; activeStamp = null;
      document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('scale-110'));
      if (document.getElementById('tool-eraser')) document.getElementById('tool-eraser').classList.add('scale-110');
    }

    function selectStamp(stampType) {
      isEraserMode = false; activeStamp = stampType; playSound('correct');
    }

    function dragStart(e) {
      if (!ctx) return;
      if(e.cancelable) e.preventDefault();
      isDrawing = true;
      const pos = getEventPos(e);
      currentStroke = [{ x: pos.x, y: pos.y }];

      if (activeStamp && appState.gradingMode === 'manual') {
        applyTeacherStamp(pos.x, pos.y);
        isDrawing = false;
        return;
      }

      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.globalCompositeOperation = isEraserMode ? 'destination-out' : 'source-over';
      ctx.strokeStyle = isEraserMode ? 'rgba(0,0,0,1)' : activeColor;
      ctx.lineWidth = isEraserMode ? 32 : activeLineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }

    function drag(e) {
      if (!isDrawing || !ctx) return;
      if(e.cancelable) e.preventDefault();
      const pos = getEventPos(e);
      currentStroke.push({ x: pos.x, y: pos.y });
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function dragEnd(e) {
      if (!isDrawing) return;
      isDrawing = false;
      if (currentStroke.length > 1) {
        strokes.push({ points: currentStroke, color: isEraserMode ? '#ffffff' : activeColor, width: isEraserMode ? 24 : activeLineWidth, isEraser: isEraserMode });
        if (appState.answerMode === 'draw' && appState.gradingMode === 'auto' && !isEraserMode) analyzeDrawingsForX();
      }
      currentStroke = [];
    }

    function getEventPos(e) {
      if (!canvas) return { x: 0, y: 0 };
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function redrawCanvas() {
      if (!ctx || !canvas) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      strokes.forEach(s => {
        if (s.isStamp) { drawStampOnCanvas(s.x, s.y, s.type); return; }
        ctx.beginPath();
        ctx.moveTo(s.points[0].x, s.points[0].y);
        for(let i=1; i<s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
        ctx.globalCompositeOperation = s.isEraser ? 'destination-out' : 'source-over';
        ctx.strokeStyle = s.isEraser ? 'rgba(0,0,0,1)' : s.color;
        ctx.lineWidth = s.width;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      });
      ctx.globalCompositeOperation = 'source-over';
    }

    function clearDrawingCanvas() { strokes = []; redrawCanvas(); }

    function applyTeacherStamp(x, y) {
      strokes.push({ isStamp: true, x: x, y: y, type: activeStamp });
      drawStampOnCanvas(x, y, activeStamp);
    }

    function drawStampOnCanvas(x, y, type) {
      if (!ctx) return;
      ctx.save(); ctx.font = '40px Arial'; ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
      if (type === 'hanamaru') ctx.fillText('💮', x, y);
      else if (type === 'check') { ctx.fillStyle = '#3b82f6'; ctx.fillText('✔️', x, y); }
      ctx.restore();
    }

    function analyzeDrawingsForX() {
      optionBounds.forEach(bound => {
        if (appState.currentAnswers[bound.questionIdx] === true) return;
        const localStrokes = strokes.filter(s => !s.isEraser && !s.isStamp && isStrokeInBox(s, bound));
        if (localStrokes.length >= 2) {
          const line1 = localStrokes[localStrokes.length - 1];
          const line2 = localStrokes[localStrokes.length - 2];
          if (checkIfLinesCrossAsX(line1, line2, bound)) handleOptionSelect(bound.questionIdx, bound.itemIdx);
        }
      });
    }

    function isStrokeInBox(stroke, box) {
      let pointsInside = 0;
      stroke.points.forEach(p => {
        if (p.x >= box.xMin && p.x <= box.xMax && p.y >= box.yMin && p.y <= box.yMax) pointsInside++;
      });
      return (pointsInside / stroke.points.length) > 0.5;
    }

    function checkIfLinesCrossAsX(line1, line2, box) {
      const p1_start = line1.points[0], p1_end = line1.points[line1.points.length - 1];
      const p2_start = line2.points[0], p2_end = line2.points[line2.points.length - 1];
      const dx1 = p1_end.x - p1_start.x, dy1 = p1_end.y - p1_start.y;
      const dx2 = p2_end.x - p2_start.x, dy2 = p2_end.y - p2_start.y;
      const slope1 = dx1 !== 0 ? dy1 / dx1 : 999, slope2 = dx2 !== 0 ? dy2 / dx2 : 999;
      const isCrossSlopes = (slope1 * slope2) < 0; 
      const boxWidth = box.xMax - box.xMin;
      const len1 = Math.sqrt(dx1*dx1 + dy1*dy1), len2 = Math.sqrt(dx2*dx2 + dy2*dy2);
      return isCrossSlopes && (len1 > boxWidth * 0.25) && (len2 > boxWidth * 0.25);
    }

    // --- 8. 両端同時タップチャイルドロック機構 ---
    let leftGearsActive = false, rightGearsActive = false;
    function setupDualGearLock() {
      const leftBtn = document.getElementById('gear-left'), rightBtn = document.getElementById('gear-right');
      if (!leftBtn || !rightBtn) return;
      const checkUnlock = () => { if (leftGearsActive && rightGearsActive) { leftGearsActive = false; rightGearsActive = false; openSettingsModal(); } };
      leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftGearsActive = true; checkUnlock(); });
      rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightGearsActive = true; checkUnlock(); });
      leftBtn.addEventListener('touchend', () => leftGearsActive = false);
      rightBtn.addEventListener('touchend', () => rightGearsActive = false);
      leftBtn.addEventListener('mousedown', () => { leftGearsActive = true; checkUnlock(); });
      rightBtn.addEventListener('mousedown', () => { rightGearsActive = true; checkUnlock(); });
      window.addEventListener('mouseup', () => { leftGearsActive = false; rightGearsActive = false; });
    }

    // --- 9. 設定モーダル・ストックシステム ---
    function openSettingsModal() {
      const modal = document.getElementById('settings-modal');
      if (modal) modal.classList.remove('hidden');
      renderStockOptions(); 
      setNextStockName(); 
      renderCustomQuestionsEditor();
      renderCustomImagesGallery();
    }

    function closeSettingsModal() {
      const modal = document.getElementById('settings-modal');
      if (modal) modal.classList.add('hidden');
      saveSettings();
      toggleSettingsVisibility();
      generateDrill(); 
    }

    function setupEventListeners() {
      document.getElementById('close-settings')?.addEventListener('click', closeSettingsModal);
      document.getElementById('clear-drawings')?.addEventListener('click', clearDrawingCanvas);

      const tabBasicBtn = document.getElementById('tab-basic-btn'), tabQuestionsBtn = document.getElementById('tab-questions-btn'), tabImagesBtn = document.getElementById('tab-images-btn');
      const tabBasic = document.getElementById('tab-basic'), tabQuestions = document.getElementById('tab-questions'), tabImages = document.getElementById('tab-images');

      if (tabBasicBtn && tabQuestionsBtn && tabImagesBtn) {
        tabBasicBtn.addEventListener('click', () => switchTab(tabBasicBtn, [tabQuestionsBtn, tabImagesBtn], tabBasic, [tabQuestions, tabImages]));
        tabQuestionsBtn.addEventListener('click', () => switchTab(tabQuestionsBtn, [tabBasicBtn, tabImagesBtn], tabQuestions, [tabBasic, tabImages]));
        tabImagesBtn.addEventListener('click', () => switchTab(tabImagesBtn, [tabBasicBtn, tabQuestionsBtn], tabImages, [tabBasic, tabQuestions]));
      }

      ['display-color', 'answer-mode', 'grading-mode', 'wrong-mark', 'question-source'].forEach(name => {
        document.querySelectorAll(`input[name="${name}"]`).forEach(radio => {
          radio.addEventListener('change', (e) => {
            let key = name;
            if(name==='display-color') key='displayColor';
            if(name==='answer-mode') key='answerMode';
            if(name==='grading-mode') key='gradingMode';
            if(name==='wrong-mark') key='wrongMark';
            if(name==='question-source') key='questionSource';
            appState[key] = e.target.value;
            
            if (name === 'answer-mode' || name === 'grading-mode') {
              const canvasEl = document.getElementById('drawing-canvas');
              if (canvasEl) (appState.answerMode === 'draw' || appState.gradingMode === 'manual') ? canvasEl.classList.remove('pointer-events-none') : canvasEl.classList.add('pointer-events-none');
            }
            if (name === 'grading-mode') syncSettingsToUI();
          });
        });
      });

      document.getElementById('option-count')?.addEventListener('change', (e) => {
        appState.optionCount = Number(e.target.value);
        renderCustomQuestionsEditor();
      });

      const fileInput = document.getElementById('camera-file-input'), captureBtn = document.getElementById('capture-image-btn');
      if (captureBtn && fileInput) {
        captureBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
              const imgId = 'custom_' + Date.now();
              saveImageToDB(imgId, event.target.result);
              appState.customImages.push({ id: imgId, base64: event.target.result });
              renderCustomImagesGallery(); renderCustomQuestionsEditor(); 
            };
            reader.readAsDataURL(file);
          }
        });
      }
    }

    function switchTab(activeBtn, inactiveBtns, activeTab, inactiveTabs) {
      activeBtn.classList.add('border-amber-800', 'text-amber-900'); activeBtn.classList.remove('text-amber-800/60');
      inactiveBtns.forEach(btn => { btn.classList.remove('border-amber-800', 'text-amber-900'); btn.classList.add('text-amber-800/60'); });
      activeTab.classList.remove('hidden'); inactiveTabs.forEach(tab => tab.classList.add('hidden'));
    }

    // --- ストック機能 ---
    function setNextStockName() {
      const input = document.getElementById('new-stock-name');
      if (input) input.value = `なかまはずれ_${(appState.savedQuestionSets.length + 1).toString().padStart(2, '0')}`;
    }

    window.renderStockOptions = function() {
      const select = document.getElementById('stock-select');
      if(!select) return;
      select.innerHTML = '<option value="">-- 保存した問題を選ぶ --</option>';
      appState.savedQuestionSets.forEach(set => {
        const opt = document.createElement('option'); opt.value = set.id; opt.textContent = set.name; select.appendChild(opt);
      });
    }

    window.saveCurrentToStock = function(btn) {
      const nameInput = document.getElementById('new-stock-name');
      if (!nameInput || !nameInput.value.trim()) {
        const org = btn.innerHTML; btn.innerHTML = "名前を入力"; btn.classList.replace('bg-blue-500', 'bg-red-500');
        setTimeout(() => { btn.innerHTML = org; btn.classList.replace('bg-red-500', 'bg-blue-500'); }, 2000); return;
      }
      appState.savedQuestionSets.push({ id: Date.now().toString(), name: nameInput.value.trim(), questions: JSON.parse(JSON.stringify(appState.customQuestions)) });
      saveSettings(); renderStockOptions();
      const org = btn.innerHTML; btn.innerHTML = "✨ 保存しました！"; btn.classList.replace('bg-blue-500', 'bg-green-500');
      setTimeout(() => { btn.innerHTML = org; btn.classList.replace('bg-green-500', 'bg-blue-500'); setNextStockName(); }, 2000);
    }

    window.loadFromStock = function(btn) {
      const id = document.getElementById('stock-select')?.value; if (!id) return;
      if (btn.dataset.confirm !== "true") {
        btn.dataset.confirm = "true"; btn.dataset.originalText = btn.innerHTML; btn.innerHTML = "上書きされるよ！OK?"; btn.classList.replace('bg-amber-600', 'bg-red-500');
        setTimeout(() => { if (btn.dataset.confirm === "true") { btn.dataset.confirm = "false"; btn.innerHTML = btn.dataset.originalText; btn.classList.replace('bg-red-500', 'bg-amber-600'); } }, 3000); return;
      }
      const stock = appState.savedQuestionSets.find(s => s.id === id);
      if (stock) {
        appState.customQuestions = JSON.parse(JSON.stringify(stock.questions)); saveSettings(); renderCustomQuestionsEditor();
        btn.dataset.confirm = "false"; btn.innerHTML = "よみこみました！"; btn.classList.replace('bg-red-500', 'bg-blue-500');
        setTimeout(() => { btn.innerHTML = btn.dataset.originalText; btn.classList.replace('bg-blue-500', 'bg-amber-600'); }, 2000);
      }
    }

    window.deleteFromStock = function(btn) {
      const id = document.getElementById('stock-select')?.value; if (!id) return;
      if (btn.dataset.confirm !== "true") {
        btn.dataset.confirm = "true"; btn.dataset.originalText = btn.innerHTML; btn.innerHTML = "本当にけす？"; btn.classList.replace('bg-stone-200', 'bg-red-500'); btn.classList.replace('text-stone-700', 'text-white');
        setTimeout(() => { if (btn.dataset.confirm === "true") { btn.dataset.confirm = "false"; btn.innerHTML = btn.dataset.originalText; btn.classList.replace('bg-red-500', 'bg-stone-200'); btn.classList.replace('text-white', 'text-stone-700'); } }, 3000); return;
      }
      appState.savedQuestionSets = appState.savedQuestionSets.filter(s => s.id !== id); saveSettings(); renderStockOptions();
      btn.dataset.confirm = "false"; btn.innerHTML = btn.dataset.originalText; btn.classList.replace('bg-red-500', 'bg-stone-200'); btn.classList.replace('text-white', 'text-stone-700');
    }

    // --- 10. カスタム写真ギャラリー ---
    function renderCustomImagesGallery() {
      const gallery = document.getElementById('custom-images-gallery'); if (!gallery) return;
      if (appState.customImages.length === 0) { gallery.innerHTML = '<div class="col-span-4 py-4 text-center text-xs text-stone-400 font-bold">まだ写真が登録されていません</div>'; return; }
      gallery.innerHTML = '';
      appState.customImages.forEach(img => {
        const item = document.createElement('div'); item.className = "relative border-2 border-amber-800/20 rounded-xl overflow-hidden bg-white aspect-square group shadow-sm";
        const image = document.createElement('img'); image.src = img.base64; image.className = "w-full h-full object-contain p-1"; item.appendChild(image);
        const delBtn = document.createElement('button'); delBtn.className = "absolute top-1 right-1 bg-red-500/80 hover:bg-red-600 text-white rounded-full p-1 shadow-md transition-colors text-xs";
        delBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`;
        delBtn.onclick = () => { if (confirm("この写真を削除しますか？")) { deleteImageFromDB(img.id); appState.customImages = appState.customImages.filter(i => i.id !== img.id); renderCustomImagesGallery(); renderCustomQuestionsEditor(); } };
        item.appendChild(delBtn); gallery.appendChild(item);
      });
    }

    // --- 11. 問題作成エディタ ---
    function renderCustomQuestionsEditor() {
      const container = document.getElementById('custom-questions-editor-container'); if (!container) return; container.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const q = appState.customQuestions[i] || { type: 'emoji', items: ['🍎', '🍏', '🍊', '🚗'], correctIndex: 3 };
        const qBox = document.createElement('div'); qBox.className = "bg-white p-4 rounded-2xl border-4 border-amber-800/20 shadow-sm space-y-3";
        const header = document.createElement('div'); header.className = "flex items-center justify-between border-b-2 border-stone-100 pb-2";
        header.innerHTML = `<h4 class="font-black text-amber-900 text-sm md:text-base">📋 大問 ${i+1}</h4><div class="flex items-center gap-2"><label class="text-xs font-bold text-stone-600">えらぶタイプ:</label><select class="bg-amber-50 border border-amber-800/40 rounded-lg px-2 py-0.5 text-xs font-bold text-amber-950" onchange="changeQuestionType(${i}, this.value)"><option value="emoji" ${q.type === 'emoji' ? 'selected' : ''}>絵文字 🍎</option><option value="image" ${q.type === 'image' ? 'selected' : ''} ${appState.customImages.length === 0 ? 'disabled' : ''}>iPad写真 📷</option></select></div>`;
        qBox.appendChild(header);

        const slotsContainer = document.createElement('div'); slotsContainer.className = "grid gap-3"; slotsContainer.style.gridTemplateColumns = `repeat(${appState.optionCount}, minmax(0, 1fr))`;

        for (let sIdx = 0; sIdx < appState.optionCount; sIdx++) {
          const item = q.items[sIdx] || (q.type === 'emoji' ? '❓' : ''); const isCorrect = sIdx === q.correctIndex;
          const slot = document.createElement('div'); slot.className = `relative p-2 border-2 rounded-xl flex flex-col items-center justify-between gap-2 transition-all ${isCorrect ? 'border-red-500 bg-red-50/20' : 'border-stone-200 hover:border-amber-500 bg-stone-50/20'}`;
          const crownBtn = document.createElement('button'); crownBtn.className = `w-full text-center py-1 rounded-lg text-[10px] font-black tracking-tighter ${isCorrect ? 'bg-red-500 text-white shadow-sm' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'}`; crownBtn.innerHTML = isCorrect ? '👑 正解' : '不正解に';
          crownBtn.onclick = () => { appState.customQuestions[i].correctIndex = sIdx; saveSettings(); renderCustomQuestionsEditor(); };
          slot.appendChild(crownBtn);

          const preview = document.createElement('div'); preview.className = "w-10 h-10 md:w-14 md:h-14 bg-white border border-stone-200 rounded-xl flex items-center justify-center overflow-hidden";
          if (q.type === 'image' && appState.customImages.length > 0) {
            const currentImg = appState.customImages.find(img => img.id === item) || appState.customImages[0];
            const imgEl = document.createElement('img'); imgEl.src = currentImg ? currentImg.base64 : ''; imgEl.className = "w-full h-full object-contain p-1"; preview.appendChild(imgEl);
            const imgSelect = document.createElement('select'); imgSelect.className = "w-full text-[10px] bg-amber-50 border border-amber-800/30 rounded px-1 py-0.5 text-center mt-1";
            appState.customImages.forEach((img, index) => { const opt = document.createElement('option'); opt.value = img.id; opt.textContent = `写真 ${index + 1}`; if (img.id === item) opt.selected = true; imgSelect.appendChild(opt); });
            imgSelect.onchange = (e) => { appState.customQuestions[i].items[sIdx] = e.target.value; saveSettings(); renderCustomQuestionsEditor(); };
            slot.appendChild(preview); slot.appendChild(imgSelect);
          } else {
            const emojiSpan = document.createElement('span'); emojiSpan.className = "text-2xl md:text-3xl"; emojiSpan.textContent = q.items[sIdx] || '🍎'; preview.appendChild(emojiSpan);
            const emojiInput = document.createElement('input'); emojiInput.type = "text"; emojiInput.className = "w-full text-center border rounded py-0.5 text-xs font-bold font-sans bg-stone-50 focus:bg-white focus:outline-none"; emojiInput.value = q.items[sIdx] || '🍎';
            emojiInput.onchange = (e) => { appState.customQuestions[i].items[sIdx] = e.target.value.trim() || '🍎'; saveSettings(); renderCustomQuestionsEditor(); };
            slot.appendChild(preview); slot.appendChild(emojiInput);
          }
          slotsContainer.appendChild(slot);
        }
        qBox.appendChild(slotsContainer); container.appendChild(qBox);
      }
    }

    window.changeQuestionType = function(qIdx, newType) {
      const q = appState.customQuestions[qIdx]; q.type = newType;
      if (newType === 'image' && appState.customImages.length > 0) q.items = Array(5).fill(appState.customImages[0].id); else q.items = ['🍎', '🍌', '🍊', '🍇', '🍉'];
      q.correctIndex = 0; saveSettings(); renderCustomQuestionsEditor();
    };

  </script>
</body>
